name: device-manager # This sets the stack/project name

services:
  devicemanager.api:
    image: devicemanager.api
    container_name: devicemanager.api
    build:
      context: .
      dockerfile: DeviceManager.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=DeviceManagerDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - JWT_KEY=${JWT_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
  
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: device-manager-db
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - device-manager-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
      
  angular-dev:
    image: node:24.12.0-alpine # Ensure Angular supports this version
    working_dir: /app
    ports:
      - "4200:4200"
    environment:
      - NG_CLI_ANALYTICS=false
    volumes:
      - ../frontend/device-manager-ui:/app
      - /app/node_modules
    # Use 'npm install' only if package.json has changed using a shell check
    command: >
      sh -c "npm install && 
             ls node_modules/.bin/ng && 
             npx ng serve --host 0.0.0.0"
    stdin_open: true
    tty: true

volumes:
  device-manager-db-data: